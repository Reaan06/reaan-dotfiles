# ===================================================================
# Hyprlock Configuration - Modern Lock Screen
# ===================================================================

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# Background
background {
    monitor =
    path = ~/wallps/default.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 300
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(186, 194, 222, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = $USER
    color = rgba(205, 214, 244, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(137, 180, 250, 0.5)
    inner_color = rgba(30, 30, 46, 0.8)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##cdd6f4">Enter Password...</span>
    hide_input = false
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <span foreground="##f38ba8">$FAIL ($ATTEMPTS)</span>
    capslock_color = rgba(249, 226, 175, 1.0)
    position = 0, -200
    halign = center
    valign = center
    rounding = 12
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Battery Status (if laptop)
label {
    monitor =
    text = cmd[update:5000] echo "  $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo 'AC')%"
    color = rgba(148, 226, 213, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 30, 30
    halign = left
    valign = bottom
}

# Network Status
label {
    monitor =
    text = cmd[update:5000] echo "  $(nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d: -f2 || echo 'Disconnected')"
    color = rgba(166, 227, 161, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}
