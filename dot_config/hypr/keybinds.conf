# --- Keybinds Personalizados ---
$mainMod = SUPER

# --- Atajos Obligatorios ---
bind = $mainMod, Return, exec, kitty
bind = $mainMod, D, exec, discord
bind = $mainMod, S, exec, spotify

# --- Atajos Opcionales (Configurados por install.sh) ---
# Navegador (Super + B)
bind = $mainMod, B, exec, $BROWSER
# Editor (Super + I)
bind = $mainMod, I, exec, $EDITOR_CMD
# Docker (Super + G)
bind = $mainMod, G, exec, docker-desktop
# Steam (Super + J)
bind = $mainMod, J, exec, steam

# --- Funcionalidades Adicionales ---
# Super (sola): Launcher
bindr = $mainMod, Super_L, exec, rofi -show drun
# Wallpaper Picker (Super + W)
bind = $mainMod, W, exec, ~/.config/scripts/wallpaper-picker.sh

# --- Gestión de Escritorios Virtuales (Lógica Personalizada) ---
# Navegar a escritorios específicos (Super + 1-5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Mover ventanas a escritorios específicos (Super + Shift + 1-5)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Navegar entre escritorios (Super + Flechas)
bind = $mainMod, left, workspace, r-1
bind = $mainMod, right, workspace, r+1

# Mover ventanas DENTRO del escritorio actual (Super + Shift + Flechas)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Mover ventana seleccionada a otro escritorio (Control + Super + Flechas)
bind = $mainMod CONTROL, left, movetoworkspace, r-1
bind = $mainMod CONTROL, right, movetoworkspace, r+1

# --- Atajos del Sistema ---
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 
# Capturas de Pantalla (Estilo Windows: Super + Shift + S)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# --- Teclas de Función (Laptop — funcionan SIN presionar Fn) ---
# XF86 keysyms: lo que envía la tecla de laptop directamente
bind = , XF86AudioMute, exec, pamixer -t
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86WebCam, exec, ~/.config/scripts/toggle-camera.sh
bind = , XF86Lock, exec, hyprlock
bind = , XF86Display, exec, nwg-displays
binde = , XF86MonBrightnessDown, exec, ~/.config/scripts/brightness-down.sh
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%

# Fallback con Fn+F (cuando el BIOS está en modo multimedia)
bind = , F1, exec, pamixer -t
binde = , F2, exec, pamixer -d 5
binde = , F3, exec, pamixer -i 5
bind = , F4, exec, pamixer --default-source -t
bind = , F8, exec, ~/.config/scripts/toggle-camera.sh
bind = , F9, exec, hyprlock
bind = , F10, exec, nwg-displays
binde = , F11, exec, ~/.config/scripts/brightness-down.sh
binde = , F12, exec, brightnessctl set +5%

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
