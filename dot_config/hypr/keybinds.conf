# ═══════════════════════════════════════════════════════════════
#  Keybinds — Caelestia (adaptado)
#  Workspace groups: Monitor 0 → WS 1-10 | Monitor 1 → WS 11-20
# ═══════════════════════════════════════════════════════════════

$wsaction = ~/.config/scripts/wsaction.sh

# ── Launcher ──
bindr = Super, Super_L, exec, pkill rofi || rofi -show drun

# ── Show Desktop (toggle) ──
bind = Super, Escape, exec, ~/.config/scripts/show-desktop.sh

# ── Misc ──
bind = Super, L, exec, hyprlock
bind = Super+Alt, L, exec, hyprlock
bindl = Ctrl+Alt, C, exec, swaync-client --close-all

# ── Brightness ──
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl = , XF86MonBrightnessDown, exec, ~/.config/scripts/brightness-down.sh

# ── Media ──
bindl = Ctrl+Super, Space, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = Ctrl+Super, Equal, exec, playerctl next
bindl = , XF86AudioNext, exec, playerctl next
bindl = Ctrl+Super, Minus, exec, playerctl previous
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# ── Kill/restart Quickshell ──
bindr = Ctrl+Super+Alt, R, exec, kill $(pgrep quickshell); sleep .2; quickshell -d &

# ═══════════════════════════════════════════════════════════════
#  Go to workspace # (Super + 1-0) — dentro del grupo del monitor
# ═══════════════════════════════════════════════════════════════
bind = Super, 1, exec, $wsaction workspace 1
bind = Super, 2, exec, $wsaction workspace 2
bind = Super, 3, exec, $wsaction workspace 3
bind = Super, 4, exec, $wsaction workspace 4
bind = Super, 5, exec, $wsaction workspace 5
bind = Super, 6, exec, $wsaction workspace 6
bind = Super, 7, exec, $wsaction workspace 7
bind = Super, 8, exec, $wsaction workspace 8
bind = Super, 9, exec, $wsaction workspace 9
bind = Super, 0, exec, $wsaction workspace 10

# ═══════════════════════════════════════════════════════════════
#  Go to workspace group # (Ctrl+Super + 1-3) — saltar entre monitores
# ═══════════════════════════════════════════════════════════════
bind = Ctrl+Super, 1, exec, $wsaction -g workspace 1
bind = Ctrl+Super, 2, exec, $wsaction -g workspace 2
bind = Ctrl+Super, 3, exec, $wsaction -g workspace 3

# ═══════════════════════════════════════════════════════════════
#  Go to workspace -1/+1
# ═══════════════════════════════════════════════════════════════
bind = Super, mouse_down, workspace, -1
bind = Super, mouse_up, workspace, +1
binde = Ctrl+Super, right, workspace, +1
binde = Ctrl+Super, left, workspace, -1
binde = Super, Page_Up, workspace, -1
binde = Super, Page_Down, workspace, +1

# Go to workspace group -1/+1 (scroll entre grupos de monitores)
bind = Ctrl+Super, mouse_down, workspace, -10
bind = Ctrl+Super, mouse_up, workspace, +10

# ═══════════════════════════════════════════════════════════════
#  Toggle special workspace
# ═══════════════════════════════════════════════════════════════
bind = Super, S, exec, spotify-launcher

# ═══════════════════════════════════════════════════════════════
#  Move window to workspace # (Super+Alt + 1-0)
# ═══════════════════════════════════════════════════════════════
bind = Super+Alt, 1, exec, $wsaction movetoworkspace 1
bind = Super+Alt, 2, exec, $wsaction movetoworkspace 2
bind = Super+Alt, 3, exec, $wsaction movetoworkspace 3
bind = Super+Alt, 4, exec, $wsaction movetoworkspace 4
bind = Super+Alt, 5, exec, $wsaction movetoworkspace 5
bind = Super+Alt, 6, exec, $wsaction movetoworkspace 6
bind = Super+Alt, 7, exec, $wsaction movetoworkspace 7
bind = Super+Alt, 8, exec, $wsaction movetoworkspace 8
bind = Super+Alt, 9, exec, $wsaction movetoworkspace 9
bind = Super+Alt, 0, exec, $wsaction movetoworkspace 10

# ═══════════════════════════════════════════════════════════════
#  Move window to workspace group # (Ctrl+Super+Alt + 1-3)
# ═══════════════════════════════════════════════════════════════
bind = Ctrl+Super+Alt, 1, exec, $wsaction -g movetoworkspace 1
bind = Ctrl+Super+Alt, 2, exec, $wsaction -g movetoworkspace 2
bind = Ctrl+Super+Alt, 3, exec, $wsaction -g movetoworkspace 3

# ═══════════════════════════════════════════════════════════════
#  Move window to workspace -1/+1
# ═══════════════════════════════════════════════════════════════
binde = Super+Alt, Page_Up, movetoworkspace, -1
binde = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, mouse_down, movetoworkspace, -1
bind = Super+Alt, mouse_up, movetoworkspace, +1
binde = Ctrl+Super+Shift, right, movetoworkspace, +1
binde = Ctrl+Super+Shift, left, movetoworkspace, -1

# ═══════════════════════════════════════════════════════════════
#  Move window to/from special workspace
# ═══════════════════════════════════════════════════════════════
bind = Ctrl+Super+Shift, up, movetoworkspace, special:special
bind = Ctrl+Super+Shift, down, movetoworkspace, e+0
bind = Super+Alt, S, movetoworkspace, special:special

# ═══════════════════════════════════════════════════════════════
#  Window groups (tabbed windows)
# ═══════════════════════════════════════════════════════════════
binde = Alt, Tab, cyclenext
binde = Shift+Alt, Tab, cyclenext, prev
binde = Ctrl+Alt, Tab, changegroupactive, f
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b
bind = Super, Comma, togglegroup
bind = Super, U, moveoutofgroup
bind = Super+Shift, Comma, lockactivegroup, toggle

# ═══════════════════════════════════════════════════════════════
#  Window actions — focus, move, resize
# ═══════════════════════════════════════════════════════════════

# Focus
bind = Super, left, movefocus, l
bind = Super, right, movefocus, r
bind = Super, up, movefocus, u
bind = Super, down, movefocus, d

# Move
bind = Super+Shift, left, movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up, movewindow, u
bind = Super+Shift, down, movewindow, d

# Resize (teclas)
binde = Super, Minus, resizeactive, -10% 0
binde = Super, Equal, resizeactive, 10% 0
binde = Super+Shift, Minus, resizeactive, 0 -10%
binde = Super+Shift, Equal, resizeactive, 0 10%

# Focus monitor (moverse entre pantallas)
bind = Super, comma, focusmonitor, -1
bind = Super, period, focusmonitor, +1

# Mover ventana a otra pantalla
bind = Super+Shift, comma, exec, ~/.config/scripts/movetomonitor.sh prev
bind = Super+Shift, period, exec, ~/.config/scripts/movetomonitor.sh next

# Resize (flechas + Ctrl)
binde = Super+Ctrl, left, resizeactive, -10% 0
binde = Super+Ctrl, right, resizeactive, 10% 0
binde = Super+Ctrl, up, resizeactive, 0 -10%
binde = Super+Ctrl, down, resizeactive, 0 10%

# Mouse
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# Center / PiP
bind = Ctrl+Super, Backslash, centerwindow, 1
bind = Ctrl+Super+Alt, Backslash, resizeactive, exact 55% 70%
bind = Ctrl+Super+Alt, Backslash, centerwindow, 1
bind = Super+Alt, Backslash, exec, caelestia resizer pip ### REQUIERE SCRIPT CAELESTIA

# Window state
bind = Super, P, pin
bind = Super, F, fullscreen, 0
bind = Super+Alt, F, fullscreen, 1
bind = Super+Alt, Space, togglefloating,
bind = Super, Q, killactive,

# ═══════════════════════════════════════════════════════════════
#  Special workspace toggles (Caelestia shell)
# ═══════════════════════════════════════════════════════════════
bind = Ctrl+Shift, Escape, exec, caelestia toggle sysmon ### REQUIERE SCRIPT CAELESTIA
bind = Super, M, exec, caelestia toggle music ### REQUIERE SCRIPT CAELESTIA
bind = Super, D, exec, caelestia toggle communication ### REQUIERE SCRIPT CAELESTIA
bind = Super, R, exec, caelestia toggle todo ### REQUIERE SCRIPT CAELESTIA

# ═══════════════════════════════════════════════════════════════
#  Apps
# ═══════════════════════════════════════════════════════════════
bind = Super, T, exec, $terminal
bind = Super, Return, exec, $terminal
bind = Super, B, exec, $browser
bind = Super, W, exec, ~/.config/scripts/wallpaper-picker.sh
bind = Super, C, exec, $editor
bind = Super, G, exec, docker-desktop
bind = Super, E, exec, $fileExplorer
bind = Super+Alt, E, exec, nemo
bind = Ctrl+Alt, Escape, exec, qps
bind = Ctrl+Alt, V, exec, pavucontrol

# ═══════════════════════════════════════════════════════════════
#  Utilidades
# ═══════════════════════════════════════════════════════════════
bindl = , Print, exec, ~/.config/scripts/screenshot.sh full
bind = Super+Shift, S, exec, ~/.config/scripts/screenshot.sh region
bind = Super+Alt, R, exec, bash -c 'wf-recorder -g "$(slurp)" -f ~/Videos/recording_$(date +%Y%m%d_%H%M%S).mp4' ### REQUIERE wf-recorder
bind = Ctrl+Alt, R, exec, bash -c 'wf-recorder -f ~/Videos/recording_$(date +%Y%m%d_%H%M%S).mp4' ### REQUIERE wf-recorder
bind = Super+Shift, C, exec, hyprpicker -a
bind = Super, period, exec, ~/.config/scripts/wallpaper-picker.sh

# ═══════════════════════════════════════════════════════════════
#  Clipboard
# ═══════════════════════════════════════════════════════════════
bind = Super, V, exec, bash -c 'cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy'
bind = Super+Alt, V, exec, bash -c 'cliphist wipe && notify-send "Clipboard" "Historial borrado"'

# ═══════════════════════════════════════════════════════════════
#  Volume
# ═══════════════════════════════════════════════════════════════
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t
bindl = , XF86AudioMute, exec, pamixer -t
bindl = Super+Shift, M, exec, pamixer -t
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindle = , XF86AudioLowerVolume, exec, pamixer -d 5

# ═══════════════════════════════════════════════════════════════
#  Sleep
# ═══════════════════════════════════════════════════════════════
bindl = Super+Shift, L, exec, systemctl suspend

# ═══════════════════════════════════════════════════════════════
#  Teclas Fn Laptop (fallback — cuando BIOS en modo multimedia)
# ═══════════════════════════════════════════════════════════════
bind = , F1, exec, pamixer -t
binde = , F2, exec, pamixer -d 5
binde = , F3, exec, pamixer -i 5
bind = , F4, exec, pamixer --default-source -t
bind = , XF86WebCam, exec, ~/.config/scripts/toggle-camera.sh
bind = , F8, exec, ~/.config/scripts/toggle-camera.sh
bind = , XF86Lock, exec, hyprlock
bind = , F9, exec, hyprlock
bind = , XF86Display, exec, nwg-displays
bind = , F10, exec, nwg-displays
binde = , F11, exec, ~/.config/scripts/brightness-down.sh
binde = , F12, exec, brightnessctl set +5%
