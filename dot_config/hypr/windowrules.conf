# ===================================================================
# Hyprland Window Rules
# ===================================================================

# Opacity rules
windowrule = opacity 0.95 0.85, match:class kitty
windowrule = opacity 0.95 0.85, match:class Alacritty
windowrule = opacity 0.95 0.85, match:class Code
windowrule = opacity 0.95 0.85, match:class code-url-handler
windowrule = opacity 0.95 0.85, match:class VSCodium
windowrule = opacity 1.0 1.0, match:class firefox
windowrule = opacity 1.0 1.0, match:class brave-browser
windowrule = opacity 1.0 1.0, match:class chromium
