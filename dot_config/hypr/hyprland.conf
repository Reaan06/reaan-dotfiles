# --- Monitores ---
source = ~/.config/hypr/monitors.conf

# --- Variables de Entorno ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = ICON_THEME,Papirus-Dark

# --- Variables Caelestia (usadas por keybinds.conf) ---
$terminal = kitty
$browser = $BROWSER
$editor = $EDITOR_CMD
$fileExplorer = thunar

# --- Look & Feel ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 15
    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
        ignore_opacity = true
    }
}

# --- Animaciones ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = fluent_decel, 0.1, 1, 0, 1

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, fluent_decel, slide
}

# --- Reglas de Capas ---
blurls = rofi
blurls = waybar

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

gestures {
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- Inputs ---
input {
    kb_layout = us,es
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

# --- Workspaces (grupos por monitor, estilo Caelestia) ---
# Monitor 0: WS 1-10 | Monitor 1: WS 11-20 | Monitor 2: WS 21-30
workspace = 1, persistent:true, default:true
workspace = 11, persistent:true, default:true

# --- Window Rules ---
source = ~/.config/hypr/windowrules.conf

# --- Keybinds ---
source = ~/.config/hypr/keybinds.conf

# --- Lanzamiento de servicios ---
exec-once = ~/.config/scripts/init-workspaces.sh &
exec-once = pidof quickshell || quickshell -d &
exec-once = pidof swaync || swaync &
exec-once = pidof nm-applet || nm-applet --indicator &
exec-once = pidof hypridle || hypridle &
exec-once = pidof polkit-kde-authentication-agent-1 || /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = pidof wl-paste || (wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store &)
