# 10-band Equalizer Sink
# Frequencies: 31, 62, 125, 250, 500, 1000, 2000, 4000, 8000, 16000 Hz

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Global Equalizer"
            media.name       = "Global Equalizer"
            filter.graph = {
                nodes = [
                    { type = builtin name = eq_band_0 label = bq_peaking control = { "Freq" = 31.0   "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_1 label = bq_peaking control = { "Freq" = 62.0   "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_2 label = bq_peaking control = { "Freq" = 125.0  "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_3 label = bq_peaking control = { "Freq" = 250.0  "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_4 label = bq_peaking control = { "Freq" = 500.0  "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_5 label = bq_peaking control = { "Freq" = 1000.0 "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_6 label = bq_peaking control = { "Freq" = 2000.0 "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_7 label = bq_peaking control = { "Freq" = 4000.0 "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_8 label = bq_peaking control = { "Freq" = 8000.0 "Q" = 1.0 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_9 label = bq_peaking control = { "Freq" = 16000.0 "Q" = 1.0 "Gain" = 0.0 } }
                ]
                links = [
                    { output = "eq_band_0:Out" input = "eq_band_1:In" }
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                    { output = "eq_band_6:Out" input = "eq_band_7:In" }
                    { output = "eq_band_7:Out" input = "eq_band_8:In" }
                    { output = "eq_band_8:Out" input = "eq_band_9:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.eq10"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name   = "effect_output.eq10"
                node.passive = true
            }
        }
    }
]
